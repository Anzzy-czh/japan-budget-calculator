<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本旅游预算专家</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <img
    src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1200&q=80"
    alt="京都街道风景"
    width="1200"
    height="800"
  >

  <section class="budget-section" aria-labelledby="budget-heading">
    <h2 id="budget-heading">日本旅游预算专家</h2>

    <div class="budget-row">
      <label for="airfare">机票</label>
      <input type="number" id="airfare" inputmode="decimal" min="0" step="1" placeholder="元" autocomplete="off">
    </div>

    <div class="budget-row">
      <label for="visa-fee">签证费</label>
      <input type="number" id="visa-fee" inputmode="decimal" min="0" step="1" placeholder="元" autocomplete="off">
    </div>

    <div class="budget-row">
      <label for="hotel">住宿</label>
      <input type="number" id="hotel" inputmode="decimal" min="0" step="1" placeholder="元" autocomplete="off">
    </div>

    <div class="budget-row">
      <label for="transport">交通</label>
      <input type="number" id="transport" inputmode="decimal" min="0" step="1" placeholder="元" autocomplete="off">
    </div>

    <div class="budget-row">
      <label for="food-shopping">餐饮与购物</label>
      <input type="number" id="food-shopping" inputmode="decimal" min="0" step="1" placeholder="元" autocomplete="off">
    </div>

    <button type="button" id="calc-btn">点击计算</button>
    <button type="button" id="clear-btn">清空</button>

    <p id="budget-result" role="status" aria-live="polite"></p>
    <p id="jpy-result" role="status" aria-live="polite"></p>
    <p id="rate-info" role="status" aria-live="polite"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
